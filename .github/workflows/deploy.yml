name: CI / Deploy

# Mirrors algo-trader's deploy pattern:
#   1. Lint the strategies (cheap, catches obvious mistakes)
#   2. Build Docker image (FROM freqtradeorg/freqtrade:stable + our overlay)
#   3. Push :latest and :<git-sha> tags to GHCR
#   4. SSH to VPS, tar the helm chart over, run `helm upgrade --install`
#
# Triggered manually from the Actions tab (workflow_dispatch). Add `push:
# branches: [main]` if you want auto-deploys on merge.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'user_data/**'
      - 'helm/**'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/freqtrade-bot   # matches values.yaml; doesn't depend on the repo name

jobs:
  test:
    name: Lint strategies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check on strategy files
        run: ruff check user_data/strategies/ --select=E,F,W --ignore=E501

  build:
    name: Build & push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Image metadata
        id: meta
        run: |
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.tag }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Helm upgrade on VPS
    runs-on: ubuntu-latest
    needs: build
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      VPS_HOST: ${{ vars.VPS_HOST }}
      VPS_USER: ${{ vars.VPS_USER }}
    steps:
      - uses: actions/checkout@v4
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          name: id_rsa
          known_hosts: unnecessary
          if_key_exists: replace
      - name: Trust VPS host key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          # Best-effort: ssh-keyscan can be rate-limited or time out from CI
          # runners. The subsequent ssh/scp commands use accept-new so they'll
          # work either way.
          if ssh-keyscan -T 10 -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/tmp/keyscan.err; then
            echo "ssh-keyscan: collected $(wc -l < ~/.ssh/known_hosts) host key(s)."
          else
            echo "::warning::ssh-keyscan failed (exit $?). stderr:"
            cat /tmp/keyscan.err || true
            echo "Will rely on StrictHostKeyChecking=accept-new for SSH commands."
          fi
      - name: Copy helm chart
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new ${VPS_USER}@${VPS_HOST}"
          # Wipe stale chart dir so partial old files can't shadow the new one.
          # Then extract WITHOUT --strip-components — the tar contains
          # helm/freqtrade/ and we want /root/helm/freqtrade/ on the VPS,
          # so we just chop the leading 'helm/' via -C /root/helm/.
          $SSH "rm -rf /root/helm/freqtrade && mkdir -p /root/helm"
          tar -czf - -C helm freqtrade | $SSH "tar -xzf - -C /root/helm/"
          # Verify the chart landed where helm expects it.
          $SSH "ls -la /root/helm/freqtrade/Chart.yaml /root/helm/freqtrade/values.yaml /root/helm/freqtrade/templates/ | head -10"
      - name: Helm upgrade
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new ${VPS_USER}@${VPS_HOST}"
          IMAGE_REPO="${REGISTRY}/${IMAGE_NAME}"
          echo "Local view: IMAGE_REPO=$IMAGE_REPO  IMAGE_TAG=$IMAGE_TAG"

          # Use bash -s with stdin so 'set -e' on the REMOTE shell aborts
          # if any command (esp. helm) fails. Without this the step exits 0
          # even when helm errors out silently.
          $SSH bash -s -- "$IMAGE_REPO" "$IMAGE_TAG" <<'REMOTE'
            set -euo pipefail
            IMAGE_REPO="$1"
            IMAGE_TAG="$2"
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "==> Remote view: IMAGE_REPO=$IMAGE_REPO  IMAGE_TAG=$IMAGE_TAG"
            if [ -z "$IMAGE_REPO" ] || [ -z "$IMAGE_TAG" ]; then
              echo "::error::IMAGE_REPO or IMAGE_TAG is empty — refusing to deploy a bad chart."
              exit 1
            fi

            echo "==> helm template --dry-run sanity check"
            helm template freqtrade /root/helm/freqtrade \
              --namespace freqtrade \
              --set image.repository="$IMAGE_REPO" \
              --set image.tag="$IMAGE_TAG" \
              | grep -E "^kind:" | sort | uniq -c

            echo
            echo "==> Running helm upgrade --install (tag: $IMAGE_TAG)..."
            helm upgrade --install freqtrade /root/helm/freqtrade \
              --namespace freqtrade \
              --create-namespace \
              --set image.repository="$IMAGE_REPO" \
              --set image.tag="$IMAGE_TAG" \
              --wait --timeout=180s

            echo
            echo "==> helm release status:"
            helm -n freqtrade list
            echo
            echo "==> Pod status:"
            kubectl -n freqtrade get pods -o wide
            echo
            echo "==> Recent events:"
            kubectl -n freqtrade get events --sort-by=.lastTimestamp | tail -10
          REMOTE
