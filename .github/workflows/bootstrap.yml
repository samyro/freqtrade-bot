name: Bootstrap freqtrade VPS

# One-time / rotation workflow. Creates the freqtrade k8s namespace, copies
# the ghcr-pull-secret from the algo-trader namespace, and creates/updates
# the freqtrade-secrets Secret from GitHub Actions secrets.
#
# Re-running is safe and is the recommended way to rotate Kraken keys or
# WebUI credentials. JWT secret + WS token are regenerated on every run
# (this invalidates existing WebUI sessions — re-login after running).
#
# Required GitHub Actions secrets:
#   KRAKEN_API_KEY       (secret) — from Kraken Settings → API → key
#   KRAKEN_API_SECRET    (secret) — paired private key
#   FT_WEBUI_PASSWORD    (secret) — long random string, save in 1Password
#
# Required GitHub Actions variables:
#   FT_WEBUI_USERNAME    (variable) — your chosen login, e.g. "freqtrader"
#   VPS_HOST             (variable) — already set: 72.62.79.28
#   VPS_USER             (variable) — already set: root
#
# Required GitHub Actions secret (already configured for algo-trader):
#   VPS_SSH_KEY          (secret)
on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Sync k8s namespace + secrets
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
        run: |
          set -euo pipefail

          # ── Sanity checks ────────────────────────────────────────────
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::VPS_SSH_KEY secret is empty or missing."
            echo "Add at: ${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          if [ -z "$VPS_HOST" ]; then
            echo "::error::VPS_HOST variable is empty or missing."
            echo "Add at: ${{ github.server_url }}/${{ github.repository }}/settings/variables/actions"
            exit 1
          fi
          echo "VPS_HOST = $VPS_HOST  (length: ${#VPS_HOST})"
          echo "VPS_SSH_KEY length: ${#VPS_SSH_KEY} bytes"

          # ── Write the key ────────────────────────────────────────────
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Validate the key has the right shape (don't leak content).
          first_line=$(head -1 ~/.ssh/id_ed25519)
          last_line=$(tail -1 ~/.ssh/id_ed25519)
          case "$first_line" in
            "-----BEGIN OPENSSH PRIVATE KEY-----"|"-----BEGIN RSA PRIVATE KEY-----"|"-----BEGIN EC PRIVATE KEY-----")
              echo "Key first line OK: $first_line" ;;
            *)
              echo "::error::Key file's first line is not a recognized PEM header."
              echo "Got: $first_line"
              echo "Expected: '-----BEGIN OPENSSH PRIVATE KEY-----' (or similar)"
              echo "Did you paste a PUBLIC key instead of the PRIVATE key?"
              exit 1 ;;
          esac
          case "$last_line" in
            "-----END OPENSSH PRIVATE KEY-----"|"-----END RSA PRIVATE KEY-----"|"-----END EC PRIVATE KEY-----")
              echo "Key last line OK." ;;
            *)
              echo "::warning::Key file's last line is unexpected: $last_line"
              echo "May be missing a trailing newline. Continuing anyway." ;;
          esac

          # ── Try ssh-keyscan, but tolerate failure ────────────────────
          # Some VPS providers rate-limit unauthenticated SSH probes from
          # CI IPs. If it fails, fall back to accept-new which is fine for
          # our threat model (one-shot deploy connection).
          if ssh-keyscan -T 10 -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/tmp/keyscan.err; then
            echo "ssh-keyscan: collected $(wc -l < ~/.ssh/known_hosts) host key(s)."
          else
            echo "::warning::ssh-keyscan failed (exit $?). stderr:"
            cat /tmp/keyscan.err || true
            echo "Falling back to StrictHostKeyChecking=accept-new for SSH commands."
            echo "STRICT_HOST=accept-new" >> "$GITHUB_ENV"
          fi

      - name: Validate required GitHub config is present
        env:
          KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}
          FT_WEBUI_USERNAME: ${{ vars.FT_WEBUI_USERNAME }}
          FT_WEBUI_PASSWORD: ${{ secrets.FT_WEBUI_PASSWORD }}
        run: |
          missing=()
          [ -z "$KRAKEN_API_KEY" ]    && missing+=("KRAKEN_API_KEY (secret)")
          [ -z "$KRAKEN_API_SECRET" ] && missing+=("KRAKEN_API_SECRET (secret)")
          [ -z "$FT_WEBUI_USERNAME" ] && missing+=("FT_WEBUI_USERNAME (variable)")
          [ -z "$FT_WEBUI_PASSWORD" ] && missing+=("FT_WEBUI_PASSWORD (secret)")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub config:"
            for m in "${missing[@]}"; do echo "  - $m"; done
            echo ""
            echo "Add them at: ${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "All required values present."

      - name: Build secrets JSON locally
        env:
          KRAKEN_API_KEY:     ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_API_SECRET:  ${{ secrets.KRAKEN_API_SECRET }}
          FT_WEBUI_USERNAME:  ${{ vars.FT_WEBUI_USERNAME }}
          FT_WEBUI_PASSWORD:  ${{ secrets.FT_WEBUI_PASSWORD }}
        run: |
          # Fresh JWT + WS token on every bootstrap run — these are
          # session-tokens; regenerating invalidates active WebUI sessions
          # but doesn't affect login (password is the auth factor).
          JWT=$(openssl rand -hex 32)
          WS=$(openssl rand -hex 16)

          # jq builds the JSON safely (no shell escape issues with special
          # characters in keys or passwords).
          jq -n \
            --arg key    "$KRAKEN_API_KEY" \
            --arg secret "$KRAKEN_API_SECRET" \
            --arg user   "$FT_WEBUI_USERNAME" \
            --arg pass   "$FT_WEBUI_PASSWORD" \
            --arg jwt    "$JWT" \
            --arg ws     "$WS" \
            '{
              exchange:   { key: $key, secret: $secret },
              api_server: { username: $user, password: $pass, jwt_secret_key: $jwt, ws_token: $ws }
            }' > /tmp/config.secrets.json

          # Sanity-check it's valid JSON without leaking values to the log.
          jq empty /tmp/config.secrets.json
          echo "Built /tmp/config.secrets.json (size: $(stat -c %s /tmp/config.secrets.json) bytes)."

      - name: Push to VPS as k8s Secret
        env:
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_HOST: ${{ vars.VPS_HOST }}
        run: |
          # Build SSH options HERE (in bash) so ${STRICT_HOST:-yes} gets
          # bash-expanded. Inside a YAML env: block, GHA stores it as a
          # literal string and ssh chokes with "unsupported option".
          SSH_OPTS=(-i "$HOME/.ssh/id_ed25519" -o "StrictHostKeyChecking=${STRICT_HOST:-yes}")

          # Copy the JSON to a temp file on the VPS, apply as Secret, then shred it.
          scp "${SSH_OPTS[@]}" \
            /tmp/config.secrets.json \
            "${VPS_USER}@${VPS_HOST}:/tmp/ft-bootstrap.json"

          # Wipe local copy now that it's on the wire.
          shred -u /tmp/config.secrets.json 2>/dev/null || rm -f /tmp/config.secrets.json

          ssh "${SSH_OPTS[@]}" "${VPS_USER}@${VPS_HOST}" bash <<'REMOTE'
            set -euo pipefail
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "==> Ensure namespace 'freqtrade' exists..."
            kubectl get ns freqtrade >/dev/null 2>&1 \
              || kubectl create namespace freqtrade

            echo "==> Ensure 'ghcr-pull-secret' in freqtrade namespace..."
            if ! kubectl -n freqtrade get secret ghcr-pull-secret >/dev/null 2>&1; then
              if kubectl -n algo-trader get secret ghcr-pull-secret >/dev/null 2>&1; then
                echo "    Copying from algo-trader namespace..."
                kubectl -n algo-trader get secret ghcr-pull-secret -o yaml \
                  | sed 's/namespace: algo-trader/namespace: freqtrade/' \
                  | kubectl apply -f -
              else
                echo "::error::ghcr-pull-secret not found in algo-trader namespace either."
                echo "    Create it manually with:"
                echo "      kubectl -n freqtrade create secret docker-registry ghcr-pull-secret \\"
                echo "        --docker-server=ghcr.io --docker-username=YOU --docker-password=YOUR_GHCR_PAT"
                exit 1
              fi
            else
              echo "    Already present."
            fi

            echo "==> Apply 'freqtrade-secrets' from bootstrap JSON..."
            kubectl -n freqtrade create secret generic freqtrade-secrets \
              --from-file=config.secrets.json=/tmp/ft-bootstrap.json \
              --dry-run=client -o yaml | kubectl apply -f -

            shred -u /tmp/ft-bootstrap.json 2>/dev/null || rm -f /tmp/ft-bootstrap.json

            echo "==> If freqtrade deployment exists, restart to pick up secret..."
            if kubectl -n freqtrade get deploy/freqtrade >/dev/null 2>&1; then
              kubectl -n freqtrade rollout restart deployment/freqtrade
              kubectl -n freqtrade rollout status deployment/freqtrade --timeout=120s
            else
              echo "    No deployment yet — run the 'CI / Deploy' workflow next."
            fi

            echo
            echo "==> Bootstrap complete. Secrets in namespace:"
            kubectl -n freqtrade get secrets
          REMOTE
      - name: Install port-forward systemd unit
        env:
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_HOST: ${{ vars.VPS_HOST }}
        run: |
          set -euo pipefail
          SSH_OPTS=(-i "$HOME/.ssh/id_ed25519" -o "StrictHostKeyChecking=${STRICT_HOST:-yes}")

          # Idempotent: writes the unit file, reloads systemd, enables + starts.
          # `kubectl port-forward` runs as root on the VPS, exposing the freqtrade
          # WebUI on the VPS's localhost:8090. The user's `ssh -L 8090:localhost:8090`
          # from their laptop terminates here.
          ssh "${SSH_OPTS[@]}" "${VPS_USER}@${VPS_HOST}" bash <<'REMOTE'
            set -euo pipefail
            cat > /etc/systemd/system/freqtrade-port-forward.service <<'UNIT'
          [Unit]
          Description=kubectl port-forward freqtrade WebUI to localhost:8090
          After=k3s.service
          Wants=k3s.service

          [Service]
          Type=simple
          Environment=KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          ExecStart=/usr/local/bin/kubectl port-forward -n freqtrade svc/freqtrade 8090:8090 --address 127.0.0.1
          Restart=always
          RestartSec=10
          User=root

          [Install]
          WantedBy=multi-user.target
          UNIT
            systemctl daemon-reload
            systemctl enable --now freqtrade-port-forward.service
            echo "==> Unit status:"
            systemctl status freqtrade-port-forward.service --no-pager | head -8 || true
          REMOTE
